# ─────────────────────────────────────────────────────────────────────────────
# Argus — Nginx Tuned Configuration
# Deployment: Single Node (reverse proxy + SPA static host)
# Written by: DevOps Agent (Phase 10 infra tuning)
#
# Preserves all STORY-054 location blocks (API proxy, WebSocket proxy,
# SPA fallback, cached static assets, /health probe) verbatim while adding
# performance tuning at the top level. This file supersedes
# deploy/nginx/nginx.conf once docker-compose.yml remounts from ../infra/.
# STORY-056 will add WebSocket proxy hardening; it can edit this file.
# ─────────────────────────────────────────────────────────────────────────────

user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;
pid /var/run/nginx.pid;

error_log /var/log/nginx/error.log warn;

events {
    worker_connections  4096;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─── Logging ────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time uct=$upstream_connect_time '
                    'urt=$upstream_response_time';
    access_log /var/log/nginx/access.log main buffer=32k flush=5s;

    # ─── Core performance ───────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    server_tokens   off;
    reset_timedout_connection on;

    # ─── Timeouts ───────────────────────────────────────────────────────
    keepalive_timeout  65;
    keepalive_requests 1000;
    client_body_timeout     30s;
    client_header_timeout   30s;
    send_timeout            30s;

    # ─── Buffers ────────────────────────────────────────────────────────
    client_max_body_size 50m;
    client_body_buffer_size 128k;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 16k;

    # ─── File handle cache ──────────────────────────────────────────────
    open_file_cache max=10000 inactive=60s;
    open_file_cache_valid 120s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # ─── Compression ────────────────────────────────────────────────────
    gzip on;
    gzip_comp_level 5;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml
               application/xml application/xml+rss text/javascript
               application/vnd.ms-fontobject application/x-font-ttf
               font/opentype image/svg+xml image/x-icon;

    # ─── Upstream pools (active color set by blue-green flip) ──────────
    include /etc/nginx/upstream.conf;

    # ─── Proxy defaults (apply to all location blocks below) ────────────
    proxy_http_version 1.1;
    proxy_buffering on;
    proxy_buffer_size 8k;
    proxy_buffers 16 8k;
    proxy_busy_buffers_size 16k;
    proxy_request_buffering on;
    proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Frontend static files
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;

            # Cache static assets
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # FIX-244 DEV-523: legacy violations export path → 301 to canonical.
        # The pre-FIX-244 frontend called /api/v1/violations/export.csv which
        # 404s (the backend resource is policy-violations). The redirect keeps
        # bookmarked CSV links working after the FE path fix in DEV-526.
        # Exact match (=) so it cannot accidentally swallow other /api paths.
        location = /api/v1/violations/export.csv {
            return 301 /api/v1/policy-violations/export.csv$is_args$args;
        }

        # API reverse proxy
        location /api/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # WebSocket proxy
        location /ws/ {
            proxy_pass http://websocket/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;
        }

        # Health check (no auth)
        location /health {
            proxy_pass http://api/api/health;
            access_log off;
        }

        # Health probe endpoints (no auth)
        location /health/live {
            proxy_pass http://api/health/live;
            access_log off;
        }

        location /health/ready {
            proxy_pass http://api/health/ready;
            access_log off;
        }

        location /health/startup {
            proxy_pass http://api/health/startup;
            access_log off;
        }
    }
}
