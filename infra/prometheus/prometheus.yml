global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: argus
    environment: development

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: argus
    metrics_path: /metrics
    static_configs:
      - targets: ['argus:8080']
        labels:
          service: argus

  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']
