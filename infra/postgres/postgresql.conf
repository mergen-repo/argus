# ─────────────────────────────────────────────────────────────────────────────
# Argus — PostgreSQL 16 + TimescaleDB Tuned Configuration
# Deployment: Single Node (on-prem / dev)
# Target Host: 8–16 GB RAM, SSD storage, 4–8 vCPU
# Scale Target: 10M+ IoT SIMs, AAA hot path (p99 < 50 ms)
# Written by: DevOps Agent (Phase 10 infra tuning, STORY-052/053 compatible)
# ─────────────────────────────────────────────────────────────────────────────

# ─── Connections & Authentication ───────────────────────────────────────────
listen_addresses = '*'
port = 5432
max_connections = 200                 # PgBouncer caps app conns (STORY-053);
                                      # headroom for admin/replication/job runner
superuser_reserved_connections = 3

# ─── Memory ─────────────────────────────────────────────────────────────────
# Assumes ~8 GB container. Re-tune in prod compose if host RAM differs.
shared_buffers = 2GB                  # ~25% of assumed RAM
effective_cache_size = 6GB            # ~75% of assumed RAM
work_mem = 16MB                       # per-op; SORT/HASH friendly for analytics
maintenance_work_mem = 512MB          # VACUUM, CREATE INDEX, CLUSTER
huge_pages = try                      # use THP when available, fall back gracefully
temp_buffers = 16MB

# ─── Parallelism ────────────────────────────────────────────────────────────
max_worker_processes = 8
max_parallel_workers = 8
max_parallel_workers_per_gather = 4
max_parallel_maintenance_workers = 4

# ─── WAL & Checkpoints ──────────────────────────────────────────────────────
wal_level = replica                   # keeps door open for streaming replica
wal_buffers = 16MB
min_wal_size = 512MB
max_wal_size = 4GB
checkpoint_completion_target = 0.9    # smoother checkpoint I/O
checkpoint_timeout = 15min
max_wal_senders = 0                   # single-node: no replication yet
wal_compression = on                  # reduce I/O for high-write CDR workload
synchronous_commit = on               # durability for billing/CDR data

# ─── Planner (SSD defaults) ─────────────────────────────────────────────────
random_page_cost = 1.1                # SSD
effective_io_concurrency = 200        # SSD concurrent I/O
seq_page_cost = 1.0
default_statistics_target = 100
jit = off                             # OLTP hot path — JIT overhead hurts p99

# ─── Background Writer ──────────────────────────────────────────────────────
bgwriter_delay = 200ms
bgwriter_lru_maxpages = 100
bgwriter_lru_multiplier = 2.0

# ─── Autovacuum (aggressive for high-churn tables) ──────────────────────────
autovacuum = on
autovacuum_max_workers = 4
autovacuum_naptime = 30s
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_scale_factor = 0.02
autovacuum_vacuum_cost_limit = 2000
autovacuum_vacuum_cost_delay = 2ms

# ─── Statement Tuning ───────────────────────────────────────────────────────
statement_timeout = 60s               # fail long-running ad-hoc queries
idle_in_transaction_session_timeout = 60s
lock_timeout = 10s
deadlock_timeout = 1s

# ─── TCP Keepalives (protect against dead PgBouncer connections) ────────────
tcp_keepalives_idle = 60
tcp_keepalives_interval = 10
tcp_keepalives_count = 6

# ─── Logging ────────────────────────────────────────────────────────────────
logging_collector = off               # let Docker capture stderr
log_destination = 'stderr'
log_min_duration_statement = 500      # log queries > 500 ms
log_line_prefix = '%m [%p] %q%u@%d '
log_checkpoints = on
log_connections = off
log_disconnections = off
log_lock_waits = on
log_temp_files = 10MB
log_autovacuum_min_duration = 1s

# ─── Extensions (TimescaleDB + pg_stat_statements) ──────────────────────────
shared_preload_libraries = 'timescaledb,pg_stat_statements'
pg_stat_statements.max = 10000
pg_stat_statements.track = all

# ─── TimescaleDB specifics ──────────────────────────────────────────────────
timescaledb.max_background_workers = 8   # continuous aggregates, retention, compression

# ─── Locale (keep as container defaults) ────────────────────────────────────
datestyle = 'iso, mdy'
timezone = 'UTC'
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'
default_text_search_config = 'pg_catalog.english'
