# ─────────────────────────────────────────────────────────────────────────────
# Argus — NATS JetStream Tuned Configuration
# Deployment: Single Node (on-prem / dev)
# Role: Event bus, job queue, cache invalidation, accounting event fan-out
# Written by: DevOps Agent (Phase 10 infra tuning)
#
# Replaces inline `command: ["--jetstream", "--store_dir=/data", "--http_port=8222"]`
# from deploy/docker-compose.yml. All prior flags preserved and extended.
# ─────────────────────────────────────────────────────────────────────────────

server_name: "argus-nats"
listen: "0.0.0.0:4222"

# ─── Monitoring / healthcheck endpoint ──────────────────────────────────────
http_port: 8222                       # /healthz, /varz, /jsz used by probes

# ─── Limits ─────────────────────────────────────────────────────────────────
max_connections: 65536
max_control_line: 4096
max_payload: 8MB                      # room for CDR batches and bulk events
max_pending: 256MB
write_deadline: "10s"
ping_interval: "30s"
ping_max: 3

# ─── Logging (to stdout → docker logs) ──────────────────────────────────────
debug: false
trace: false
logtime: true

# ─── JetStream (persistent event streams) ───────────────────────────────────
jetstream {
  store_dir: "/data"
  max_memory_store: 512MB             # in-memory streams cap
  max_file_store: 10GB                # file-backed streams cap
  sync_interval: "2m"                 # batch fsync for throughput
}

# ─── Slow consumer protection ───────────────────────────────────────────────
max_subscriptions: 0                  # unlimited per client
lame_duck_duration: "30s"
lame_duck_grace_period: "10s"
