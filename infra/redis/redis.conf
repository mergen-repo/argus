# =============================================================================
# Argus - Redis 7 Tuned Configuration
# Deployment: Single Node (on-prem / dev)
# Role: Session cache, policy cache, rate limiter, auth vectors, SoR decisions
# Written by: DevOps Agent (Phase 10 infra tuning)
#
# Replaces inline `command: redis-server --appendonly yes --maxmemory 512mb ...`
# from deploy/docker-compose.yml. All prior flags preserved and extended.
#
# NOTE: Redis config parser does NOT accept trailing inline comments on the
# same line as a directive. Comments must live on their own lines.
# =============================================================================

# ----- Network ---------------------------------------------------------------
bind 0.0.0.0 -::*
port 6379
# protected-mode disabled: container sits on private bridge network only
protected-mode no
# somaxconn; raise kernel backlog if running very high connection churn
tcp-backlog 511
# detect dead client connections
tcp-keepalive 60
# no idle timeout; Go client pool manages connection lifetime
timeout 0

# ----- General ---------------------------------------------------------------
daemonize no
supervised no
loglevel notice
# empty string sends logs to stdout so docker logs capture them
logfile ""
databases 16
always-show-logo no

# ----- Memory Management -----------------------------------------------------
# same ceiling as prior inline config (STORY-052 perf tuning)
maxmemory 512mb
# cache workload: SIM / policy / session caches benefit from LRU
maxmemory-policy allkeys-lru
# higher sample count = closer to true LRU
maxmemory-samples 10
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
lazyfree-lazy-user-del yes

# ----- Persistence (AOF) -----------------------------------------------------
# Argus uses Redis for session state (CoA/DM) and rate-limit counters;
# losing them on restart is survivable but AOF keeps us safe.
appendonly yes
appendfilename "appendonly.aof"
# balanced durability vs throughput
appendfsync everysec
# avoid fsync stalls during rewrite
no-appendfsync-on-rewrite yes
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
aof-use-rdb-preamble yes

# ----- RDB Snapshots (belt-and-braces) ---------------------------------------
save 900 1
save 300 10
save 60 10000
# keep serving traffic on snapshot failure
stop-writes-on-bgsave-error no
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# ----- Slow Log --------------------------------------------------------------
# log commands taking longer than 10 ms
slowlog-log-slower-than 10000
slowlog-max-len 128

# ----- Client Output Buffers (guard against misbehaving subscribers) ---------
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# ----- Background Task Frequency ---------------------------------------------
hz 10
dynamic-hz yes

# ----- Advanced --------------------------------------------------------------
activerehashing yes
# track command latencies exceeding 100 ms
latency-monitor-threshold 100
# keyspace notifications disabled; enable if future cache invalidation uses them
notify-keyspace-events ""

# ----- Performance: I/O Threads ----------------------------------------------
io-threads 4
io-threads-do-reads yes
