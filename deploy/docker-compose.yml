name: argus

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  nginx:
    image: nginx:alpine@sha256:582c496ccf79d8aa6f8203a79d32aaf7ffd8b13362c60a701a2f9ac64886c93d
    container_name: argus-nginx
    ports:
      - "8084:80"
    volumes:
      - ../infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../infra/nginx/upstream.conf:/etc/nginx/upstream.conf:ro
      - ../web/dist:/usr/share/nginx/html:ro
    depends_on:
      argus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - argus-net
    restart: unless-stopped
    logging: *default-logging

  argus:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.argus
    container_name: argus-app
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
      - "3868:3868"
      - "8443:8443"
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
      operator-sim:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - argus-net
    restart: unless-stopped
    logging: *default-logging

  postgres:
    image: timescale/timescaledb:latest-pg16@sha256:332b99870c99c20d0d852ec600c097ee00ac93f5e0c75a8e83673394cdb36bfd
    container_name: argus-postgres
    ports:
      - "5450:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-argus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-argus_secret}
      POSTGRES_DB: ${POSTGRES_DB:-argus}
      ARGUS_WAL_BUCKET: ${ARGUS_WAL_BUCKET:-}
      ARGUS_WAL_PREFIX: ${ARGUS_WAL_PREFIX:-argus/}
    shm_size: 512mb
    volumes:
      - pgdata:/var/lib/postgresql/data
      - postgres_wal_archive:/var/lib/postgresql/wal_archive
      - ../infra/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command:
      - "postgres"
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-argus}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 60s
    networks:
      - argus-net
    restart: unless-stopped
    logging: *default-logging

  redis:
    image: redis:7-alpine@sha256:8b81dd37ff027bec4e516d41acfbe9fe2460070dc6d4a4570a2ac5b9d59df065
    container_name: argus-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
      - ../infra/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - argus-net
    restart: unless-stopped
    logging: *default-logging

  nats:
    image: nats:2.10-alpine@sha256:b83efabe3e7def1e0a4a31ec6e078999bb17c80363f881df35edc70fcb6bb927
    container_name: argus-nats
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - natsdata:/data
      - ../infra/nats/nats.conf:/etc/nats/nats.conf:ro
    command: ["-c", "/etc/nats/nats.conf"]
    # NOTE: nats:latest is distroless (no wget/curl/sh), so no healthcheck
    # block is defined. /healthz is still exposed on :8222 for external probes.
    networks:
      - argus-net
    restart: unless-stopped
    logging: *default-logging

  operator-sim:
    build:
      context: ..
      dockerfile: deploy/operator-sim/Dockerfile
    image: argus-operator-sim:latest
    container_name: argus-operator-sim
    restart: unless-stopped
    environment:
      ARGUS_OPERATOR_SIM_CONFIG: /etc/operator-sim/config.yaml
      ARGUS_OPERATOR_SIM_LOG_LEVEL: ${ARGUS_OPERATOR_SIM_LOG_LEVEL:-info}
    volumes:
      - ./operator-sim/config.example.yaml:/etc/operator-sim/config.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9596/-/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - argus-net

  pgbouncer:
    image: edoburu/pgbouncer:latest@sha256:85d1e38593617af1b5f7f285e97d407e56c29939683cc7cfe4c8f6dc19f1268b
    container_name: argus-pgbouncer
    ports:
      - "6432:6432"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-argus}:${POSTGRES_PASSWORD:-argus_secret}@postgres:5432/${POSTGRES_DB:-argus}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 5
      SERVER_IDLE_TIMEOUT: 600
      MAX_DB_CONNECTIONS: 50
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 6432 -U ${POSTGRES_USER:-argus}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - argus-net
    restart: unless-stopped
    logging: *default-logging

volumes:
  pgdata:
  postgres_wal_archive:
  redisdata:
  natsdata:

networks:
  argus-net:
    driver: bridge
