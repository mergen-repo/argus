name: argus

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  nginx:
    image: nginx:alpine
    container_name: argus-nginx
    ports:
      - "8084:80"
    volumes:
      - ../infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../web/dist:/usr/share/nginx/html:ro
    depends_on:
      argus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - argus-net
    restart: unless-stopped
    logging: *default-logging

  argus:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.argus
    container_name: argus-app
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
      - "3868:3868"
      - "8443:8443"
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - argus-net
    restart: unless-stopped
    logging: *default-logging

  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: argus-postgres
    ports:
      - "5450:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-argus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-argus_secret}
      POSTGRES_DB: ${POSTGRES_DB:-argus}
    shm_size: 512mb
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../infra/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command:
      - "postgres"
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-argus}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - argus-net
    restart: unless-stopped
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: argus-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
      - ../infra/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - argus-net
    restart: unless-stopped
    logging: *default-logging

  nats:
    image: nats:latest
    container_name: argus-nats
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - natsdata:/data
      - ../infra/nats/nats.conf:/etc/nats/nats.conf:ro
    command: ["-c", "/etc/nats/nats.conf"]
    # NOTE: nats:latest is distroless (no wget/curl/sh), so no healthcheck
    # block is defined. /healthz is still exposed on :8222 for external probes.
    networks:
      - argus-net
    restart: unless-stopped
    logging: *default-logging

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: argus-pgbouncer
    ports:
      - "6432:6432"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-argus}:${POSTGRES_PASSWORD:-argus_secret}@postgres:5432/${POSTGRES_DB:-argus}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 5
      SERVER_IDLE_TIMEOUT: 600
      MAX_DB_CONNECTIONS: 50
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 6432 -U ${POSTGRES_USER:-argus}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - argus-net
    restart: unless-stopped
    logging: *default-logging

volumes:
  pgdata:
  redisdata:
  natsdata:

networks:
  argus-net:
    driver: bridge
