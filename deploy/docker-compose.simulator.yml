# Compose overlay for the RADIUS traffic simulator (STORY-082).
#
# Used WITH deploy/docker-compose.yml:
#
#   docker compose -f deploy/docker-compose.yml \
#                  -f deploy/docker-compose.simulator.yml \
#                  up -d simulator
#
# Or via the Makefile: `make sim-up`, `make sim-down`, `make sim-logs`.
#
# The simulator is STRICTLY OPT-IN. Do not add it to the base compose file.

services:
  simulator:
    build:
      context: ..
      dockerfile: deploy/simulator/Dockerfile
    image: argus-simulator:latest
    container_name: argus-simulator
    restart: "no"
    environment:
      # Hard enable flag — simulator exits non-zero without this.
      SIMULATOR_ENABLED: "true"
      ARGUS_SIM_CONFIG: /etc/simulator/config.yaml
      ARGUS_SIM_LOG_LEVEL: ${ARGUS_SIM_LOG_LEVEL:-info}
      # AC-9 env knobs (FIX-226) — all optional; YAML values used when unset.
      ARGUS_SIM_SESSION_RATE_PER_SEC: ${ARGUS_SIM_SESSION_RATE_PER_SEC:-}    # max RADIUS req/s
      ARGUS_SIM_VIOLATION_RATE_PCT: ${ARGUS_SIM_VIOLATION_RATE_PCT:-}         # aggressive_m2m weight (0-100%)
      ARGUS_SIM_DIAMETER_ENABLED: ${ARGUS_SIM_DIAMETER_ENABLED:-}             # false = disable all Diameter
      ARGUS_SIM_SBA_ENABLED: ${ARGUS_SIM_SBA_ENABLED:-}                       # false = disable all SBA
      ARGUS_SIM_INTERIM_INTERVAL_SEC: ${ARGUS_SIM_INTERIM_INTERVAL_SEC:-}     # override all interim intervals
    volumes:
      - ./simulator/config.example.yaml:/etc/simulator/config.yaml:ro
    ports:
      # RADIUS auth/accounting ports are intentionally NOT published to the host —
      # argus-app reaches the simulator over the argus-net compose bridge by hostname.
      # Reactive CoA/DM listener (STORY-085) binds UDP :3799 on the container; also
      # NOT published — Argus sends DM/CoA over the compose bridge.
      - "9099:9099"  # metrics scrape (Prometheus)
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9099/-/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - argus-net
    depends_on:
      argus:
        condition: service_healthy
      postgres:
        condition: service_healthy
