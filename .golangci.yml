version: "2"

# Initial CI restoration: golangci-lint had been broken since the Go 1.25
# upgrade (the action's `latest` resolver returned a v1.x binary built with
# Go 1.24, which refuses to run against go.mod's `go 1.25.9` directive).
# After fixing the action version, the default rule-set surfaced 135 stale
# issues that accumulated while the linter was non-functional:
#
#   * errcheck:     50  (unchecked Close()/Exec() returns, mostly tests)
#   * staticcheck:  47  (style + a few real bugs)
#   * unused:       29  (dead helpers in test files; missed when the
#                       calling test cases were retired)
#   * ineffassign:   9
#
# We enable only `govet` for now — it finds the highest-value real bugs
# (nil deref, format-string mismatches, lost cancels) and the codebase is
# already clean against it. Other linters are deferred to follow-up
# cleanups (tracked as D-201). Re-enable them one at a time as the
# corresponding categories are remediated.
linters:
  default: none
  enable:
    - govet
